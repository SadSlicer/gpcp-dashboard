name: Refresh ETF compositions

# Cloud-native replacement for the local launchd cron
# (com.gpcp.dashboard.compositions): on the 15th of each month, re-scrape the
# ETF sector/geo factsheets, commit the refreshed etf_compositions.json back to
# the repo, which makes Streamlit Cloud auto-redeploy with fresh look-through
# data. Individual stocks' sector/country are fetched live in-app (yfinance),
# so this job only needs to refresh the curated ETF breakdowns.
#
# NOTE: this commits to `main`. If you ever rebuild the orphan `deploy` branch
# locally and force-push, first pull this file forward:
#     git fetch origin main && git checkout origin/main -- etf_compositions.json
# otherwise the manual redeploy would revert the auto-refreshed compositions.

on:
  schedule:
    - cron: "0 6 15 * *"      # 15th of each month, 06:00 UTC
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install --quiet pdfplumber yfinance

      - name: Refresh compositions
        run: python monthly_compositions_update.py

      - name: Commit refreshed compositions (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- etf_compositions.json; then
            echo "No composition changes — nothing to commit."
          else
            git add etf_compositions.json
            git commit -m "Auto-refresh ETF compositions ($(date -u +%Y-%m-%d))"
            git push
          fi
